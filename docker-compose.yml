version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: buhclaude-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buhclaude}
      POSTGRES_USER: ${POSTGRES_USER:-buhclaude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buhclaude_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buhclaude} -d ${POSTGRES_DB:-buhclaude}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: buhclaude-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@buhclaude.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
