# BuhClaude frontend — nginx config for production container.
#
# Responsibilities:
#   - serve the Vite-built SPA from /usr/share/nginx/html
#   - SPA fallback: any unknown path returns index.html so client-side
#     React Router can handle /ai, /payments, /documents/:id, ...
#   - reverse-proxy /api/* to the backend service over the compose network
#   - basic hardening: no server tokens, no autoindex, no dotfile leaks
#
# Notes:
#   - The backend container is reachable by name "backend" on the compose
#     network. If you put nginx in front of a different host, change the
#     proxy_pass target accordingly.
#   - Gzip is enabled for text-y types; brotli is left out to keep the image
#     small (no nginx-brotli module).

server {
    listen      80 default_server;
    server_name _;

    # Don't reveal nginx version in headers / error pages.
    server_tokens off;

    # Serve the SPA.
    root        /usr/share/nginx/html;
    index       index.html;

    # Don't list directories.
    autoindex off;

    # Block access to hidden files (e.g. .env, .git) accidentally copied in.
    location ~ /\. {
        deny all;
        return 404;
    }

    # Long cache for hashed Vite assets, no-cache for the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Reverse proxy: /api/* → backend:3001
    # Keep the path intact (Fastify registers /api/v1/* prefixes).
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Avoid double-buffering large PDF/XLSX downloads.
        proxy_buffering    off;
    }

    # Light security headers. CSP is intentionally NOT set yet —
    # see docs/security-checklist.md.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip text-y assets. JS/CSS bundles are already content-hashed.
    gzip               on;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_vary          on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml;

    # SPA fallback — must be last.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
